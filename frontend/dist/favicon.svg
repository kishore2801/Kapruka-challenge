<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g transform="scale(0.85) translate(20, 20)">
    <!-- Tail -->
    <path d="M150,150 Q200,80 150,40 Q100,0 90,60" fill="#D2691E" stroke="#1a1a1a" stroke-width="3" />
    <path d="M140,140 Q180,80 140,50" fill="#A0522D" />

    <!-- Body -->
    <ellipse cx="100" cy="130" rx="40" ry="50" fill="#8B4513" stroke="#1a1a1a" stroke-width="2" />
    <ellipse cx="100" cy="135" rx="28" ry="38" fill="#F4A460" />

    <!-- Head Base -->
    <path d="M65,60 Q50,25 75,25 Q85,40 90,55 Z" fill="#8B4513" stroke="#1a1a1a" stroke-width="2" />
    <path d="M68,55 Q58,35 72,35 Q80,42 85,50 Z" fill="#FFB6C1" />
    <path d="M135,60 Q150,25 125,25 Q115,40 110,55 Z" fill="#8B4513" stroke="#1a1a1a" stroke-width="2" />
    <path d="M132,55 Q142,35 128,35 Q120,42 115,50 Z" fill="#FFB6C1" />
    <ellipse cx="100" cy="80" rx="42" ry="36" fill="#8B4513" stroke="#1a1a1a" stroke-width="2" />

    <!-- Face -->
    <ellipse cx="70" cy="88" rx="8" ry="4" fill="#FFB6C1" opacity="0.8" />
    <ellipse cx="130" cy="88" rx="8" ry="4" fill="#FFB6C1" opacity="0.8" />

    <!-- Eyes -->
    <circle cx="82" cy="76" r="6" fill="#1a1a1a" />
    <circle cx="118" cy="76" r="6" fill="#1a1a1a" />
    <circle cx="80" cy="74" r="2" fill="#FFF" />
    <circle cx="116" cy="74" r="2" fill="#FFF" />

    <!-- Nose and Mouth -->
    <circle cx="100" cy="82" r="3.5" fill="#1a1a1a" />
    <path d="M95,86 Q100,92 105,86" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" />

    <!-- Buck Teeth -->
    <rect x="96" y="85" width="8" height="5" fill="#FFF" stroke="#1a1a1a" stroke-width="1.5" rx="1" />
    <line x1="100" y1="85" x2="100" y2="90" stroke="#1a1a1a" stroke-width="1" />
  </g>
</svg>
